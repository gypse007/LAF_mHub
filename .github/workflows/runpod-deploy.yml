name: Build and Push RunPod Worker

on:
  push:
    branches:
      - main
    paths:
      - 'backend/runpod/**'
      - '.github/workflows/runpod-deploy.yml'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space on Ubuntu runner
        # The SDXL models are huge (15GB+), we need to maximize available space on the free runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Requires Docker Hub username and personal access token stored in GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push RunPod Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/runpod
          push: true
          # Tags the image with 'latest' and the git commit hash
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/laf-mural-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/laf-mural-worker:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/laf-mural-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/laf-mural-worker:buildcache,mode=max
